<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiate</title>
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0806;
    --surface:  #1a1008;
    --border:   #3a2010;
    --accent:   #FF5A5A;
    --accent2:  #FF8B5A;
    --accent3:  #FFA95A;
    --accent4:  #FFD45A;
    --text:     #ffffff;
    --muted:    #a07060;
    --radius:   12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    background: rgba(20,10,6,0.90);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .logo {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, #FF5A5A, #FFD45A);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-left: auto;
    align-items: center;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 8px 16px;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.96); }
  button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-upload {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-record {
    background: #2a1510;
    color: #FFA95A;
    border: 1px solid #5a2a10;
  }
  .btn-record.recording {
    background: #5a1010;
    color: #FF5A5A;
    border-color: #FF5A5A;
    animation: pulse-rec 1s ease-in-out infinite;
  }
  @keyframes pulse-rec {
    0%,100% { opacity:1; } 50% { opacity:0.65; }
  }
  .btn-play {
    background: linear-gradient(135deg, #FF5A5A, #FF8B5A);
    color: #fff;
    min-width: 80px;
  }
  .btn-animate {
    background: #2a1f0a;
    color: #FFD45A;
    border: 1px solid #5a3f10;
  }

  /* ── Violin modal ── */
  #violin-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,4,2,0.75);
    backdrop-filter: blur(5px);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #violin-modal.visible { display: flex; }
  #violin-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.65);
    display: flex;
    flex-direction: column;
  }
  #violin-panel-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  #violin-panel-hdr button {
    background: none;
    color: var(--muted);
    padding: 3px 8px;
    font-size: 1rem;
    border-radius: 6px;
  }
  #violin-panel-hdr button:hover { color: var(--text); background: var(--border); }
  #violin-canvas {
    display: block;
    width: 600px;
    height: 430px;
    max-width: 90vw;
  }
  #violin-status {
    display: flex;
    gap: 28px;
    padding: 11px 20px;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--muted);
    align-items: center;
  }
  #viol-note {
    font-size: 1.15rem;
    font-weight: 800;
    min-width: 44px;
    font-variant-numeric: tabular-nums;
  }
  #viol-bow  { letter-spacing: 0.02em; }
  #viol-pos  { margin-left: auto; font-style: italic; }

  /* ── status bar ── */
  #status-bar {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    padding: 6px;
    flex-shrink: 0;
    min-height: 24px;
    letter-spacing: 0.03em;
  }
  #status-bar.active { color: #FF8B5A; }

  /* ── canvas area ── */
  #viz-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── overlay note info ── */
  #note-info {
    position: absolute;
    top: 18px;
    left: 24px;
    pointer-events: none;
  }
  #note-name {
    font-size: 3.5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  #note-hz {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  /* ── bottom transport ── */
  #transport {
    padding: 10px 24px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    background: rgba(20,10,6,0.90);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
  }
  #progress-wrap {
    flex: 1;
    position: relative;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    cursor: pointer;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF5A5A, #FFD45A);
    border-radius: 99px;
    width: 0%;
    transition: width 0.05s linear;
  }
  #time-label {
    font-size: 0.78rem;
    color: var(--muted);
    min-width: 80px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* hidden file input */
  #file-input { display: none; }

  /* processing overlay */
  #processing-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(15,8,6,0.88);
    backdrop-filter: blur(8px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 20;
  }
  #processing-overlay.visible { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: #FF5A5A;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .proc-label { color: var(--muted); font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <span class="logo">AUDIATE</span>
  <div class="controls">
    <button class="btn-upload" id="btn-upload">Upload File</button>
    <button class="btn-record" id="btn-record">⏺ Record</button>
    <button class="btn-play"    id="btn-play"    disabled>Play</button>
    <button class="btn-animate" id="btn-animate" disabled>Animate</button>
  </div>
</header>

<div id="status-bar">Upload an audio file or record to get started.</div>

<div id="viz-wrap">
  <canvas id="canvas"></canvas>

  <div id="note-info">
    <div id="note-name" style="color:#FF5A5A">—</div>
    <div id="note-hz"></div>
  </div>

  <div id="processing-overlay">
    <div class="spinner"></div>
    <div class="proc-label" id="proc-label">Extracting notes…</div>
  </div>
</div>

<div id="transport">
  <div id="progress-wrap">
    <div id="progress-fill"></div>
  </div>
  <div id="time-label">0:00 / 0:00</div>
</div>

<input type="file" id="file-input" accept="audio/*">

<!-- ── Violin modal ─────────────────────────────────────────────────────── -->
<div id="violin-modal">
  <div id="violin-panel">
    <div id="violin-panel-hdr">
      <span>Violin Visualizer</span>
      <button id="btn-violin-close">✕</button>
    </div>
    <canvas id="violin-canvas" width="600" height="430"></canvas>
    <div id="violin-status">
      <span id="viol-note" style="color:#7a5030">—</span>
      <span id="viol-bow">—</span>
      <span id="viol-pos">—</span>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  notes:        [],          // extracted note list
  meta:         null,        // { bpm, total_duration, … }
  audioUrl:     null,        // blob URL or server URL for the audio
  audioCtx:     null,
  analyser:     null,
  sourceNode:   null,
  audioBuffer:  null,
  startedAt:    0,           // AudioContext.currentTime when play started
  pausedAt:     0,           // seconds into track when paused
  playing:      false,
  hapticTimers: [],
};

// ─── DOM refs ────────────────────────────────────────────────────────────────
const canvas        = document.getElementById("canvas");
const ctx2d         = canvas.getContext("2d");
const btnUpload     = document.getElementById("btn-upload");
const btnRecord     = document.getElementById("btn-record");
const btnPlay       = document.getElementById("btn-play");
const btnAnimate    = document.getElementById("btn-animate");
const fileInput     = document.getElementById("file-input");
const statusBar     = document.getElementById("status-bar");
const noteNameEl    = document.getElementById("note-name");
const noteHzEl      = document.getElementById("note-hz");
const progressFill  = document.getElementById("progress-fill");
const timeLabel     = document.getElementById("time-label");
const overlay       = document.getElementById("processing-overlay");
const procLabel     = document.getElementById("proc-label");

// ─── Resize canvas ───────────────────────────────────────────────────────────
function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width  = wrap.clientWidth  * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx2d.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener("resize", () => { resizeCanvas(); drawIdle(); });
resizeCanvas();

// ─── Colour helpers ───────────────────────────────────────────────────────────
// Map MIDI number → hue (low = blue/violet, high = pink/yellow)
function midiToHue(midi) {
  // C3=48 → 240° (blue)  … C6=84 → 330° (pink)
  const lo = 48, hi = 84;
  const t  = Math.max(0, Math.min(1, (midi - lo) / (hi - lo)));
  // 240° → 300° → 60° (cycling through spectrum)
  return (240 + t * 200) % 360;
}
function noteColor(midi, alpha = 1) {
  const h = midiToHue(midi);
  return `hsla(${h}, 80%, 65%, ${alpha})`;
}
function noteGlow(midi) {
  const h = midiToHue(midi);
  return `hsla(${h}, 90%, 70%, 0.25)`;
}

// ─── Note geometry ────────────────────────────────────────────────────────────
// We draw a piano-roll that scrolls so current time is always at 30% from left.
const ROLL = {
  windowSec: 12,     // total seconds shown
  headRatio: 0.30,   // playhead at 30% of canvas width
  midiLo:    40,     // lowest MIDI shown
  midiHi:    90,     // highest MIDI shown
  noteH:     0,      // computed per frame
  rollTop:   0,      // y start of piano roll
  rollBot:   0,      // y end (exclusive)
};

function midiToY(midi) {
  // high midi at top, low at bottom
  const t = 1 - (midi - ROLL.midiLo) / (ROLL.midiHi - ROLL.midiLo);
  return ROLL.rollTop + t * (ROLL.rollBot - ROLL.rollTop);
}

function timeToX(noteSec, currentSec) {
  const w     = canvas.width / devicePixelRatio;
  const head  = w * ROLL.headRatio;
  const pixPerSec = w / ROLL.windowSec;
  return head + (noteSec - currentSec) * pixPerSec;
}

// ─── Audio / analysis data ────────────────────────────────────────────────────
let waveData  = new Uint8Array(1024);
let freqData  = new Uint8Array(1024);

function ensureAudioCtx() {
  if (!state.audioCtx) {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 2048;
    state.analyser.smoothingTimeConstant = 0.8;
    state.analyser.connect(state.audioCtx.destination);
    waveData = new Uint8Array(state.analyser.fftSize);
    freqData = new Uint8Array(state.analyser.frequencyBinCount);
  }
}

// ─── Upload / record flow ────────────────────────────────────────────────────
btnUpload.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) sendToServer(fileInput.files[0]);
});

// Drag-and-drop onto canvas area
canvas.addEventListener("dragover", e => e.preventDefault());
canvas.addEventListener("drop", e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) sendToServer(file);
});

// Recording
let mediaRec = null, recChunks = [];
btnRecord.addEventListener("click", async () => {
  if (mediaRec && mediaRec.state === "recording") {
    mediaRec.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mime   = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
                   ? "audio/webm;codecs=opus" : "audio/webm";
    mediaRec  = new MediaRecorder(stream, { mimeType: mime });
    recChunks = [];
    mediaRec.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRec.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      btnRecord.textContent = "⏺ Record";
      btnRecord.classList.remove("recording");
      const blob = new Blob(recChunks, { type: mime });
      const file = new File([blob], "recording.webm", { type: mime });
      sendToServer(file);
    };
    mediaRec.start(250);
    btnRecord.textContent = "⏹ Stop";
    btnRecord.classList.add("recording");
    setStatus("Recording… click Stop when done.", true);
  } catch (err) {
    setStatus("Microphone access denied.");
  }
});

async function sendToServer(file) {
  stopAudio();
  showOverlay("Uploading…");
  setStatus("Uploading audio…", true);

  const fd = new FormData();
  fd.append("audio", file);

  let resp;
  try {
    resp = await fetch("/api/process", { method: "POST", body: fd });
  } catch (e) {
    hideOverlay();
    setStatus("Network error — is the server running?");
    return;
  }

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    hideOverlay();
    setStatus("Error: " + (err.error || resp.statusText));
    return;
  }

  procLabel.textContent = "Extracting notes…";
  const data = await resp.json();

  state.notes    = data.notes.notes;
  state.meta     = data.notes.meta;
  state.audioUrl = data.audio_url;

  // Compute MIDI range from notes
  const midis = state.notes.filter(n => !n.is_rest).map(n => n.midi);
  if (midis.length) {
    ROLL.midiLo = Math.max(30, Math.min(...midis) - 6);
    ROLL.midiHi = Math.min(100, Math.max(...midis) + 6);
  }

  // Load audio buffer
  showOverlay("Decoding audio…");
  try {
    ensureAudioCtx();
    const abuf = await fetch(state.audioUrl).then(r => r.arrayBuffer());
    state.audioBuffer = await state.audioCtx.decodeAudioData(abuf);
  } catch (e) {
    hideOverlay(); setStatus("Audio decode failed: " + e.message); return;
  }

  hideOverlay();
  btnPlay.disabled    = false;
  btnPlay.textContent = "Play";
  btnAnimate.disabled = false;
  const nc = state.meta.note_count;
  setStatus(`Ready — ${nc} note${nc !== 1 ? "s" : ""} detected  ·  BPM ${state.meta.bpm}  ·  ${fmt(state.meta.total_duration)}`, true);
}

// ─── Playback ─────────────────────────────────────────────────────────────────
btnPlay.addEventListener("click", () => {
  if (state.playing) pauseAudio(); else playAudio(state.pausedAt);
});

// Click on progress bar to seek
document.getElementById("progress-wrap").addEventListener("click", e => {
  if (!state.audioBuffer) return;
  const r   = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  const t   = pct * state.audioBuffer.duration;
  if (state.playing) { stopAudio(); playAudio(t); }
  else { state.pausedAt = t; updateTransport(t); }
});

function playAudio(fromSec = 0) {
  ensureAudioCtx();
  if (!state.audioBuffer) return;

  state.sourceNode = state.audioCtx.createBufferSource();
  state.sourceNode.buffer = state.audioBuffer;
  state.sourceNode.connect(state.analyser);
  state.sourceNode.start(0, fromSec);
  state.sourceNode.onended = () => {
    if (state.playing) { state.playing = false; state.pausedAt = 0; btnPlay.textContent = "Play"; }
  };

  state.startedAt = state.audioCtx.currentTime - fromSec;
  state.playing   = true;
  state.pausedAt  = fromSec;
  btnPlay.textContent = "Pause";

  scheduleHaptics(fromSec);
  requestAnimationFrame(drawFrame);
}

function pauseAudio() {
  state.pausedAt = currentTime();
  stopAudio(false);
  btnPlay.textContent = "Play";
  state.playing = false;
}

function stopAudio(reset = true) {
  clearHaptics();
  if (state.sourceNode) {
    try { state.sourceNode.stop(); } catch (_) {}
    state.sourceNode.disconnect();
    state.sourceNode = null;
  }
  state.playing = false;
  if (reset) { state.pausedAt = 0; updateTransport(0); }
}

function currentTime() {
  if (!state.audioCtx) return 0;
  if (state.playing) return state.audioCtx.currentTime - state.startedAt;
  return state.pausedAt;
}

// ─── Haptics ─────────────────────────────────────────────────────────────────
function scheduleHaptics(fromSec) {
  clearHaptics();
  if (!navigator.vibrate) return;
  const now = performance.now();

  state.notes.forEach(note => {
    if (note.is_rest) return;
    const delay = (note.start_time - fromSec) * 1000;
    if (delay < -100) return; // already passed
    const t = setTimeout(() => {
      navigator.vibrate(Math.round(Math.min(note.duration * 900, 800)));
    }, Math.max(0, delay));
    state.hapticTimers.push(t);
  });
}

function clearHaptics() {
  state.hapticTimers.forEach(t => clearTimeout(t));
  state.hapticTimers = [];
  if (navigator.vibrate) navigator.vibrate(0);
}

// ─── Rendering ───────────────────────────────────────────────────────────────
const WAVEFORM_H = 80;    // px reserved for waveform at top
const SPECTRUM_H = 70;    // px reserved for spectrum at bottom
const LABEL_W    = 32;    // px for piano key labels on left

function drawFrame() {
  if (!state.playing) return;
  requestAnimationFrame(drawFrame);

  const W = canvas.width  / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  const t = currentTime();

  ROLL.rollTop = WAVEFORM_H + 10;
  ROLL.rollBot = H - SPECTRUM_H - 10;
  ROLL.noteH   = Math.max(4, (ROLL.rollBot - ROLL.rollTop) / (ROLL.midiHi - ROLL.midiLo));

  // ── pull analysis data ──
  state.analyser.getByteTimeDomainData(waveData);
  state.analyser.getByteFrequencyData(freqData);

  // ── background ──
  ctx2d.clearRect(0, 0, W, H);
  ctx2d.fillStyle = "#06060f";
  ctx2d.fillRect(0, 0, W, H);

  drawSpectrum(W, H);
  drawPianoRoll(W, H, t);
  drawWaveform(W, H);
  drawPlayhead(W, H, t);
  updateNoteInfo(t);
  updateTransport(t);
}

function drawIdle() {
  const W = canvas.width  / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  ctx2d.fillStyle = "#06060f";
  ctx2d.fillRect(0, 0, W, H);
  ctx2d.fillStyle = "#1e1e3a";
  ctx2d.font = "14px system-ui";
  ctx2d.textAlign = "center";
  ctx2d.fillText("Drop an audio file here, or use the controls above.", W/2, H/2);
}

// ── Spectrum ──────────────────────────────────────────────────────────────────
function drawSpectrum(W, H) {
  const barCount = 80;
  const barW     = (W - LABEL_W) / barCount;
  const yBase    = H;

  for (let i = 0; i < barCount; i++) {
    const idx   = Math.floor(i / barCount * freqData.length * 0.5);
    const val   = freqData[idx] / 255;
    const barH  = val * SPECTRUM_H * 1.4;
    const hue   = 220 + (i / barCount) * 160;
    ctx2d.fillStyle = `hsla(${hue}, 80%, 60%, ${0.3 + val * 0.5})`;
    ctx2d.fillRect(LABEL_W + i * barW + 1, yBase - barH, barW - 2, barH);
  }
}

// ── Waveform ─────────────────────────────────────────────────────────────────
function drawWaveform(W, H) {
  const sliceW  = (W - LABEL_W) / waveData.length;
  const midY    = WAVEFORM_H / 2;

  ctx2d.beginPath();
  ctx2d.lineWidth   = 1.5;
  ctx2d.strokeStyle = "rgba(180,160,255,0.8)";

  for (let i = 0; i < waveData.length; i++) {
    const v = (waveData[i] / 128.0 - 1) * (WAVEFORM_H * 0.45);
    const x = LABEL_W + i * sliceW;
    const y = midY + v;
    i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
  }
  ctx2d.stroke();
}

// ── Piano roll ────────────────────────────────────────────────────────────────
function drawPianoRoll(W, H, currentSec) {
  const rollH = ROLL.rollBot - ROLL.rollTop;

  // subtle grid lines per octave
  for (let midi = ROLL.midiLo; midi <= ROLL.midiHi; midi++) {
    if (midi % 12 === 0) {
      const y = midiToY(midi);
      ctx2d.strokeStyle = "rgba(255,255,255,0.05)";
      ctx2d.lineWidth = 1;
      ctx2d.beginPath();
      ctx2d.moveTo(LABEL_W, y); ctx2d.lineTo(W, y);
      ctx2d.stroke();
      ctx2d.fillStyle = "rgba(255,255,255,0.2)";
      ctx2d.font = "10px monospace";
      ctx2d.textAlign = "right";
      const name = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"][midi%12];
      const oct  = (midi >> 2) - 1; // rough octave
      ctx2d.fillText(`${name}${Math.floor(midi/12)-1}`, LABEL_W - 3, y + 4);
    }
  }

  const pixPerSec = W / ROLL.windowSec;
  const headX     = W * ROLL.headRatio;

  state.notes.forEach(note => {
    if (note.is_rest || note.midi === null) return;

    const x1 = timeToX(note.start_time, currentSec);
    const x2 = timeToX(note.start_time + note.duration, currentSec);
    if (x2 < LABEL_W || x1 > W) return; // offscreen

    const y    = midiToY(note.midi);
    const h    = Math.max(4, ROLL.noteH - 2);
    const w    = Math.max(4, x2 - x1 - 2);
    const hue  = midiToHue(note.midi);

    // is this note currently playing?
    const isActive = note.start_time <= currentSec &&
                     currentSec < note.start_time + note.duration;

    if (isActive) {
      // glow halo
      ctx2d.shadowColor = `hsl(${hue}, 90%, 65%)`;
      ctx2d.shadowBlur  = 20;
    }

    const alpha = isActive ? 1 : 0.55 + 0.3 * note.confidence;
    ctx2d.fillStyle = `hsla(${hue}, 80%, ${isActive ? 65 : 55}%, ${alpha})`;
    ctx2d.beginPath();
    ctx2d.roundRect(x1, y - h/2, w, h, 3);
    ctx2d.fill();

    ctx2d.shadowBlur = 0;
    ctx2d.shadowColor = "transparent";
  });
}

// ── Playhead ──────────────────────────────────────────────────────────────────
function drawPlayhead(W, H, currentSec) {
  const x = W * ROLL.headRatio;

  // gradient line
  const grad = ctx2d.createLinearGradient(x, ROLL.rollTop, x, ROLL.rollBot);
  grad.addColorStop(0,   "rgba(150,120,255,0)");
  grad.addColorStop(0.3, "rgba(160,130,255,0.9)");
  grad.addColorStop(0.7, "rgba(160,130,255,0.9)");
  grad.addColorStop(1,   "rgba(150,120,255,0)");

  ctx2d.strokeStyle = grad;
  ctx2d.lineWidth   = 2;
  ctx2d.shadowColor = "#a78bfa";
  ctx2d.shadowBlur  = 12;
  ctx2d.beginPath();
  ctx2d.moveTo(x, ROLL.rollTop);
  ctx2d.lineTo(x, ROLL.rollBot);
  ctx2d.stroke();
  ctx2d.shadowBlur = 0;
}

// ── Note info overlay ─────────────────────────────────────────────────────────
function updateNoteInfo(t) {
  const active = state.notes.find(
    n => !n.is_rest && n.start_time <= t && t < n.start_time + n.duration
  );
  if (active) {
    const hue = midiToHue(active.midi);
    noteNameEl.textContent = active.note_name;
    noteNameEl.style.color = `hsl(${hue}, 85%, 72%)`;
    noteHzEl.textContent   = active.hz ? `${active.hz} Hz` : "";
  } else {
    noteNameEl.textContent = "—";
    noteNameEl.style.color = "#7b6fff";
    noteHzEl.textContent   = "";
  }
}

// ── Transport ─────────────────────────────────────────────────────────────────
function updateTransport(t) {
  if (!state.audioBuffer) return;
  const dur = state.audioBuffer.duration;
  const pct = Math.min(100, (t / dur) * 100);
  progressFill.style.width = pct + "%";
  timeLabel.textContent = `${fmt(t)} / ${fmt(dur)}`;
}

// ─── Utils ───────────────────────────────────────────────────────────────────
function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, "0");
  return `${m}:${s}`;
}
function setStatus(msg, active = false) {
  statusBar.textContent = msg;
  statusBar.className   = active ? "active" : "";
}
function showOverlay(msg) {
  procLabel.textContent = msg;
  overlay.classList.add("visible");
}
function hideOverlay() {
  overlay.classList.remove("visible");
}

// ─── Init ─────────────────────────────────────────────────────────────────────
drawIdle();
</script>

<script>
// ─── Violin Animation ─────────────────────────────────────────────────────────
(function () {
  const VW = 600, VH = 430;

  // ── Layout ──────────────────────────────────────────────────────────────────
  const HEAD     = { x: 355, y: 82,  rx: 34, ry: 38 };
  const L_SHOUL  = { x: 278, y: 158 };  // violin arm
  const R_SHOUL  = { x: 418, y: 158 };  // bow arm
  const BODY_TOP = { x: 332, y: 120 };
  const BODY_BOT = { x: 328, y: 368 };

  const NUT      = { x: 102, y: 84  };
  const SCROLL   = { x: 76,  y: 64  };
  const NECK_JN  = { x: 160, y: 154 };  // neck–body join
  const VIOL_UC  = { x: 162, y: 188 };  // upper bout centre
  const VIOL_LC  = { x: 174, y: 272 };  // lower bout centre
  const BRIDGE   = { x: 168, y: 226 };
  const TAIL     = { x: 176, y: 292 };

  const BOW_Y       = 222;  // y of bow hair at bridge
  const BOW_LEN     = 248;
  const FROG_X_MAX  = 398;  // arm pulled in  (start of down-bow)
  const FROG_X_MIN  = 292;  // arm extended   (end of down-bow)
  const STRING_XS   = [155, 162, 169, 176]; // 4 string x-positions

  // ── State ────────────────────────────────────────────────────────────────────
  let vCanvas, vCtx, rc;
  let staticImg   = null;
  let bowPos      = 0.5;  // 0 = frog on strings, 1 = tip on strings
  let bowDir      = 1;    // +1 down-bow, −1 up-bow
  let lastNoteIdx = -1;
  let animId      = null;
  let isOpen      = false;

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function frogX() {
    return FROG_X_MAX - bowPos * (FROG_X_MAX - FROG_X_MIN);
  }

  function fingerPos(midi) {
    if (!midi) return { x: NUT.x + 3, y: NUT.y + 2 };
    const t = Math.max(0, Math.min(1, (midi - 55) / (84 - 55)));
    return {
      x: NUT.x + t * (NECK_JN.x - NUT.x),
      y: NUT.y + t * (NECK_JN.y - NUT.y),
    };
  }

  // ── Static render (violin body + figure torso, cached) ───────────────────────
  function renderStatic() {
    const oc  = document.createElement('canvas');
    oc.width  = VW; oc.height = VH;
    const ox  = oc.getContext('2d');
    const orc = rough.canvas(oc);

    // Paper background
    ox.fillStyle = '#f7f2e8';
    ox.fillRect(0, 0, VW, VH);
    for (let i = 0; i < 1400; i++) {
      ox.fillStyle = `rgba(160,140,100,${Math.random() * 0.022})`;
      ox.fillRect(Math.random() * VW, Math.random() * VH, 2, 2);
    }

    const wood = { roughness: 1.4, stroke: '#4a2e10', strokeWidth: 2.2, fill: '#c4883a', fillStyle: 'solid' };
    const dark = { roughness: 1.5, stroke: '#2a1608', strokeWidth: 1.8, fill: '#1a0e04', fillStyle: 'solid' };

    // Lower bout
    orc.ellipse(VIOL_LC.x, VIOL_LC.y, 94, 82, wood);
    // Upper bout
    orc.ellipse(VIOL_UC.x, VIOL_UC.y, 74, 66, wood);
    // Waist fill
    ox.fillStyle = '#c4883a';
    ox.beginPath();
    ox.ellipse(VIOL_UC.x + 4, VIOL_UC.y + 42, 36, 20, 0.15, 0, Math.PI * 2);
    ox.fill();
    // Re-outline
    orc.ellipse(VIOL_LC.x, VIOL_LC.y, 94, 82, { roughness: 1.2, stroke: '#4a2e10', strokeWidth: 2, fill: 'transparent' });
    orc.ellipse(VIOL_UC.x, VIOL_UC.y, 74, 66, { roughness: 1.2, stroke: '#4a2e10', strokeWidth: 2, fill: 'transparent' });
    // Purfling
    orc.ellipse(VIOL_LC.x, VIOL_LC.y, 82, 70, { roughness: 1, stroke: '#2a1608', strokeWidth: 1, fill: 'transparent' });

    // F-holes
    orc.line(BRIDGE.x - 16, BRIDGE.y - 22, BRIDGE.x - 20, BRIDGE.y + 18, { roughness: 2.2, stroke: '#2a1608', strokeWidth: 2.2 });
    orc.line(BRIDGE.x + 12, BRIDGE.y - 20, BRIDGE.x + 10, BRIDGE.y + 20, { roughness: 2.2, stroke: '#2a1608', strokeWidth: 2.2 });

    // Neck wood
    orc.line(NUT.x, NUT.y, NECK_JN.x, NECK_JN.y, { roughness: 0.8, stroke: '#7a5030', strokeWidth: 13 });
    // Fingerboard (darker)
    orc.line(NUT.x - 2, NUT.y + 2, NECK_JN.x - 2, NECK_JN.y + 2, { roughness: 0.5, stroke: '#1a0e04', strokeWidth: 7 });

    // 4 Strings
    for (let i = 0; i < 4; i++) {
      const nutOff = -6 + i * 4;
      orc.line(NUT.x + nutOff, NUT.y + 2, STRING_XS[i], TAIL.y - 2,
        { roughness: 0.3, stroke: '#909090', strokeWidth: 0.9 });
    }

    // Bridge arch
    orc.arc(BRIDGE.x, BRIDGE.y - 4, 26, 14, Math.PI, 0, false, { roughness: 2, stroke: '#7a5030', strokeWidth: 2.5 });
    orc.line(BRIDGE.x - 10, BRIDGE.y + 4, BRIDGE.x + 10, BRIDGE.y + 4, { roughness: 1, stroke: '#7a5030', strokeWidth: 1.5 });

    // Scroll
    orc.arc(SCROLL.x + 10, SCROLL.y + 10, 26, 26, Math.PI * 0.5, Math.PI * 2.6, false, { roughness: 2.5, stroke: '#3a1e08', strokeWidth: 2.8 });
    orc.arc(SCROLL.x + 8,  SCROLL.y + 8,  13, 13, Math.PI * 0.5, Math.PI * 2.6, false, { roughness: 2,   stroke: '#3a1e08', strokeWidth: 1.5 });

    // Tailpiece
    orc.polygon(
      [[TAIL.x - 14, TAIL.y - 5], [TAIL.x + 14, TAIL.y - 5],
       [TAIL.x + 10, TAIL.y + 18], [TAIL.x - 10, TAIL.y + 18]],
      dark
    );

    // Chin rest
    orc.ellipse(VIOL_UC.x + 22, VIOL_UC.y - 34, 28, 14,
      { roughness: 1.5, stroke: '#3a1e08', fill: '#1a0e04', fillStyle: 'solid', strokeWidth: 1.5 });

    // Head
    orc.ellipse(HEAD.x, HEAD.y, HEAD.rx * 2, HEAD.ry * 2,
      { roughness: 1.2, stroke: '#3a2008', strokeWidth: 1.8, fill: '#f0c880', fillStyle: 'solid' });
    // Hair
    orc.arc(HEAD.x, HEAD.y - 10, HEAD.rx * 2 - 2, HEAD.ry * 1.5, Math.PI, 0, false,
      { roughness: 3.5, stroke: '#180e00', strokeWidth: 6 });
    // Ear
    orc.arc(HEAD.x - HEAD.rx + 2, HEAD.y + 4, 10, 14, Math.PI * 0.5, Math.PI * 1.5, false,
      { roughness: 2, stroke: '#c09060', strokeWidth: 1.5 });

    // Torso / jacket
    orc.line(BODY_TOP.x, BODY_TOP.y, L_SHOUL.x, L_SHOUL.y, { roughness: 1.5, stroke: '#1a1828', strokeWidth: 6 });
    orc.line(BODY_TOP.x, BODY_TOP.y, R_SHOUL.x, R_SHOUL.y, { roughness: 1.5, stroke: '#1a1828', strokeWidth: 6 });
    orc.line(BODY_TOP.x, BODY_TOP.y, BODY_BOT.x, BODY_BOT.y, { roughness: 1.5, stroke: '#1a1828', strokeWidth: 6 });
    orc.ellipse(BODY_TOP.x + 18, BODY_TOP.y + 105, 95, 178,
      { roughness: 2, stroke: '#12101e', fill: '#12101e', fillStyle: 'hachure', fillWeight: 2.5, hachureGap: 9, hachureAngle: 42 });
    // Shirt front
    orc.line(BODY_TOP.x + 12, BODY_TOP.y + 8, BODY_TOP.x + 12, BODY_TOP.y + 48,
      { roughness: 1.5, stroke: '#e8e0d0', strokeWidth: 2 });

    // Legs
    orc.line(BODY_BOT.x - 12, BODY_BOT.y, BODY_BOT.x - 18, BODY_BOT.y + 62, { roughness: 2, stroke: '#1a1828', strokeWidth: 5 });
    orc.line(BODY_BOT.x + 8,  BODY_BOT.y, BODY_BOT.x + 12, BODY_BOT.y + 62, { roughness: 2, stroke: '#1a1828', strokeWidth: 5 });

    staticImg = oc;
  }

  // ── Per-frame draw ───────────────────────────────────────────────────────────
  function drawFrame() {
    if (!isOpen) return;
    animId = requestAnimationFrame(drawFrame);

    const t     = currentTime();
    const notes = state.notes;

    // Find active note
    let activeNote = null, noteIdx = -1;
    for (let i = 0; i < notes.length; i++) {
      const n = notes[i];
      if (!n.is_rest && n.start_time <= t && t < n.start_time + n.duration) {
        activeNote = n; noteIdx = i; break;
      }
    }

    // Note change → flip bow direction
    if (noteIdx !== -1 && noteIdx !== lastNoteIdx) {
      bowDir = -bowDir;
      lastNoteIdx = noteIdx;
    }

    // Advance bow (speed ∝ 1/duration so short notes = fast bow)
    if (activeNote) {
      const speed = Math.min(0.022, 0.45 / (activeNote.duration * 60));
      bowPos += bowDir * speed;
      if (bowPos >= 1) { bowPos = 1; bowDir = -1; }
      if (bowPos <= 0) { bowPos = 0; bowDir =  1; }
    }

    const fp   = activeNote ? fingerPos(activeNote.midi) : { x: NUT.x + 3, y: NUT.y + 2 };
    const fx   = frogX();
    const tipX = fx - BOW_LEN;

    // Composite: static base first
    vCtx.clearRect(0, 0, VW, VH);
    vCtx.drawImage(staticImg, 0, 0);

    // ── Left arm (violin arm) ──
    const elbLX = (L_SHOUL.x + fp.x) / 2 - 14;
    const elbLY = (L_SHOUL.y + fp.y) / 2 + 28;
    rc.line(L_SHOUL.x, L_SHOUL.y, elbLX, elbLY, { roughness: 1.5, stroke: '#1a1828', strokeWidth: 6 });
    rc.line(elbLX, elbLY, fp.x, fp.y,            { roughness: 1.2, stroke: '#1a1828', strokeWidth: 5 });
    // Left hand
    rc.ellipse(fp.x - 3, fp.y + 1, 15, 10,
      { roughness: 2, stroke: '#3a2008', fill: '#f0c880', fillStyle: 'solid', strokeWidth: 1.5 });
    // Pressing fingers
    if (activeNote) {
      for (let f = 0; f < 3; f++) {
        rc.ellipse(fp.x - 5 + f * 3, fp.y + 3, 5, 4,
          { roughness: 1.5, stroke: '#3a2008', fill: '#d0a060', fillStyle: 'solid', strokeWidth: 1 });
      }
    }

    // ── Right arm (bow arm) ──
    const elbRX = (R_SHOUL.x + fx) / 2 + 18;
    const elbRY = 218;
    rc.line(R_SHOUL.x, R_SHOUL.y, elbRX, elbRY, { roughness: 1.5, stroke: '#1a1828', strokeWidth: 6 });
    rc.line(elbRX, elbRY, fx, BOW_Y + 5,         { roughness: 1.2, stroke: '#1a1828', strokeWidth: 5 });
    // Right hand
    rc.ellipse(fx + 3, BOW_Y + 9, 18, 12,
      { roughness: 1.8, stroke: '#3a2008', fill: '#f0c880', fillStyle: 'solid', strokeWidth: 1.5 });

    // ── Bow ──
    // Stick (pernambuco wood)
    rc.line(tipX, BOW_Y - 10, fx, BOW_Y + 4, { roughness: 0.7, stroke: '#6a3e18', strokeWidth: 3.5 });
    // Bow hair
    rc.line(tipX + 7, BOW_Y - 1, fx - 12, BOW_Y + 1, { roughness: 0.4, stroke: '#e0d8c8', strokeWidth: 2 });
    // Frog (ebony)
    rc.rectangle(fx - 15, BOW_Y - 4, 15, 12,
      { roughness: 1.5, stroke: '#2a1608', fill: '#1a0e04', fillStyle: 'solid', strokeWidth: 1.5 });
    // Tip (ivory)
    rc.rectangle(tipX - 4, BOW_Y - 12, 8, 8,
      { roughness: 1.5, stroke: '#4a3018', fill: '#f0ece0', fillStyle: 'solid', strokeWidth: 1 });

    // ── Rosin dust at string contact ──
    if (activeNote) {
      vCtx.save();
      for (let i = 0; i < 6; i++) {
        vCtx.globalAlpha = 0.1 + Math.random() * 0.15;
        vCtx.fillStyle   = '#d4a040';
        vCtx.beginPath();
        vCtx.arc(163 + (Math.random() - 0.5) * 12, BOW_Y + (Math.random() - 0.5) * 8,
                 Math.random() * 2.5 + 0.5, 0, Math.PI * 2);
        vCtx.fill();
      }
      vCtx.restore();
    }

    // ── Status labels ──
    const hue = activeNote ? (240 + ((activeNote.midi - 48) / 36) * 200) % 360 : null;
    document.getElementById('viol-note').textContent = activeNote ? activeNote.note_name : '—';
    document.getElementById('viol-note').style.color = hue ? `hsl(${hue},65%,40%)` : '#7a5030';
    document.getElementById('viol-bow').textContent  = bowDir > 0 ? '↓ down bow' : '↑ up bow';
    document.getElementById('viol-pos').textContent  =
      !activeNote       ? 'open string' :
      activeNote.midi < 58 ? '1st pos'   :
      activeNote.midi < 64 ? '2nd pos'   :
      activeNote.midi < 70 ? '3rd pos'   : '4th+ pos';
  }

  // ── Open / close ─────────────────────────────────────────────────────────────
  function openModal() {
    if (!staticImg) renderStatic();
    isOpen = true; bowPos = 0.5; bowDir = 1; lastNoteIdx = -1;
    document.getElementById('violin-modal').classList.add('visible');
    drawFrame();
  }
  function closeModal() {
    isOpen = false;
    document.getElementById('violin-modal').classList.remove('visible');
    if (animId) { cancelAnimationFrame(animId); animId = null; }
  }

  window.addEventListener('DOMContentLoaded', () => {
    vCanvas = document.getElementById('violin-canvas');
    vCtx    = vCanvas.getContext('2d');
    rc      = rough.canvas(vCanvas);

    document.getElementById('btn-animate').addEventListener('click', openModal);
    document.getElementById('btn-violin-close').addEventListener('click', closeModal);
    document.getElementById('violin-modal').addEventListener('click', e => {
      if (e.target.id === 'violin-modal') closeModal();
    });
  });
})();
</script>
