<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  notes:        [],          // extracted note list
  meta:         null,        // { bpm, total_duration, … }
  audioUrl:     null,        // blob URL or server URL for the audio
  audioCtx:     null,
  analyser:     null,
  sourceNode:   null,
  audioBuffer:  null,
  startedAt:    0,           // AudioContext.currentTime when play started
  pausedAt:     0,           // seconds into track when paused
  playing:      false,
  hapticTimers: [],
};

// ─── DOM refs ────────────────────────────────────────────────────────────────
const canvas        = document.getElementById("canvas");
const ctx2d         = canvas.getContext("2d");
const btnUpload     = document.getElementById("btn-upload");
const btnRecord     = document.getElementById("btn-record");
const btnPlay       = document.getElementById("btn-play");
const btnAnimate    = document.getElementById("btn-animate");
const fileInput     = document.getElementById("file-input");
const statusBar     = document.getElementById("status-bar");
const noteNameEl    = document.getElementById("note-name");
const noteHzEl      = document.getElementById("note-hz");
const progressFill  = document.getElementById("progress-fill");
const timeLabel     = document.getElementById("time-label");
const overlay       = document.getElementById("processing-overlay");
const procLabel     = document.getElementById("proc-label");

// ─── Resize canvas ───────────────────────────────────────────────────────────
function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width  = wrap.clientWidth  * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx2d.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener("resize", () => { resizeCanvas(); drawIdle(); });
resizeCanvas();

// ─── Colour helpers ───────────────────────────────────────────────────────────
// Map MIDI number → hue (low = blue/violet, high = pink/yellow)
function midiToHue(midi) {
  // Low notes → coral red (0°) … high notes → golden yellow (55°)
  const lo = 48, hi = 84;
  const t  = Math.max(0, Math.min(1, (midi - lo) / (hi - lo)));
  return t * 55;
}
function noteColor(midi, alpha = 1) {
  const h = midiToHue(midi);
  return `hsla(${h}, 95%, 62%, ${alpha})`;
}
function noteGlow(midi) {
  const h = midiToHue(midi);
  return `hsla(${h}, 100%, 68%, 0.28)`;
}

// ─── Note geometry ────────────────────────────────────────────────────────────
// We draw a piano-roll that scrolls so current time is always at 30% from left.
const ROLL = {
  windowSec: 12,     // total seconds shown
  headRatio: 0.30,   // playhead at 30% of canvas width
  midiLo:    40,     // lowest MIDI shown
  midiHi:    90,     // highest MIDI shown
  noteH:     0,      // computed per frame
  rollTop:   0,      // y start of piano roll
  rollBot:   0,      // y end (exclusive)
};

function midiToY(midi) {
  // high midi at top, low at bottom
  const t = 1 - (midi - ROLL.midiLo) / (ROLL.midiHi - ROLL.midiLo);
  return ROLL.rollTop + t * (ROLL.rollBot - ROLL.rollTop);
}

function timeToX(noteSec, currentSec) {
  const w     = canvas.width / devicePixelRatio;
  const head  = w * ROLL.headRatio;
  const pixPerSec = w / ROLL.windowSec;
  return head + (noteSec - currentSec) * pixPerSec;
}

// ─── Audio / analysis data ────────────────────────────────────────────────────
let waveData  = new Uint8Array(1024);
let freqData  = new Uint8Array(1024);

function ensureAudioCtx() {
  if (!state.audioCtx) {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 2048;
    state.analyser.smoothingTimeConstant = 0.8;
    state.analyser.connect(state.audioCtx.destination);
    waveData = new Uint8Array(state.analyser.fftSize);
    freqData = new Uint8Array(state.analyser.frequencyBinCount);
  }
}

// ─── Upload / record flow ────────────────────────────────────────────────────
btnUpload.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) sendToServer(fileInput.files[0]);
});

// Drag-and-drop onto canvas area
canvas.addEventListener("dragover", e => e.preventDefault());
canvas.addEventListener("drop", e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) sendToServer(file);
});

// Recording
let mediaRec = null, recChunks = [];
btnRecord.addEventListener("click", async () => {
  if (mediaRec && mediaRec.state === "recording") {
    mediaRec.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mime   = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
                   ? "audio/webm;codecs=opus" : "audio/webm";
    mediaRec  = new MediaRecorder(stream, { mimeType: mime });
    recChunks = [];
    mediaRec.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRec.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      btnRecord.textContent = "⏺ Record";
      btnRecord.classList.remove("recording");
      const blob = new Blob(recChunks, { type: mime });
      const file = new File([blob], "recording.webm", { type: mime });
      sendToServer(file);
    };
    mediaRec.start(250);
    btnRecord.textContent = "⏹ Stop";
    btnRecord.classList.add("recording");
    setStatus("Recording… click Stop when done.", true);
  } catch (err) {
    setStatus("Microphone access denied.");
  }
});

async function sendToServer(file) {
  stopAudio();
  showOverlay("Uploading…");
  setStatus("Uploading audio…", true);

  const fd = new FormData();
  fd.append("audio", file);

  let resp;
  try {
    resp = await fetch("/api/process", { method: "POST", body: fd });
  } catch (e) {
    hideOverlay();
    setStatus("Network error — is the server running?");
    return;
  }

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    hideOverlay();
    setStatus("Error: " + (err.error || resp.statusText));
    return;
  }

  procLabel.textContent = "Extracting notes…";
  const data = await resp.json();

  state.notes    = data.notes.notes;
  state.meta     = data.notes.meta;
  state.audioUrl = data.audio_url;

  // Compute MIDI range from notes
  const midis = state.notes.filter(n => !n.is_rest).map(n => n.midi);
  if (midis.length) {
    ROLL.midiLo = Math.max(30, Math.min(...midis) - 6);
    ROLL.midiHi = Math.min(100, Math.max(...midis) + 6);
  }

  // Load audio buffer
  showOverlay("Decoding audio…");
  try {
    ensureAudioCtx();
    const abuf = await fetch(state.audioUrl).then(r => r.arrayBuffer());
    state.audioBuffer = await state.audioCtx.decodeAudioData(abuf);
  } catch (e) {
    hideOverlay(); setStatus("Audio decode failed: " + e.message); return;
  }

  hideOverlay();
  btnPlay.disabled    = false;
  btnPlay.textContent = "Play";
  btnAnimate.disabled = false;
  const nc = state.meta.note_count;
  setStatus(`Ready — ${nc} note${nc !== 1 ? "s" : ""} detected  ·  BPM ${state.meta.bpm}  ·  ${fmt(state.meta.total_duration)}`, true);
}

// ─── Playback ─────────────────────────────────────────────────────────────────
btnPlay.addEventListener("click", () => {
  if (state.playing) pauseAudio(); else playAudio(state.pausedAt);
});

// Click on progress bar to seek
document.getElementById("progress-wrap").addEventListener("click", e => {
  if (!state.audioBuffer) return;
  const r   = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  const t   = pct * state.audioBuffer.duration;
  if (state.playing) { stopAudio(); playAudio(t); }
  else { state.pausedAt = t; updateTransport(t); }
});

function playAudio(fromSec = 0) {
  ensureAudioCtx();
  if (!state.audioBuffer) return;

  state.sourceNode = state.audioCtx.createBufferSource();
  state.sourceNode.buffer = state.audioBuffer;
  state.sourceNode.connect(state.analyser);
  state.sourceNode.start(0, fromSec);
  state.sourceNode.onended = () => {
    if (state.playing) { state.playing = false; state.pausedAt = 0; btnPlay.textContent = "Play"; }
  };

  state.startedAt = state.audioCtx.currentTime - fromSec;
  state.playing   = true;
  state.pausedAt  = fromSec;
  btnPlay.textContent = "Pause";

  scheduleHaptics(fromSec);
  requestAnimationFrame(drawFrame);
}

function pauseAudio() {
  state.pausedAt = currentTime();
  stopAudio(false);
  btnPlay.textContent = "Play";
  state.playing = false;
}

function stopAudio(reset = true) {
  clearHaptics();
  if (state.sourceNode) {
    try { state.sourceNode.stop(); } catch (_) {}
    state.sourceNode.disconnect();
    state.sourceNode = null;
  }
  state.playing = false;
  if (reset) { state.pausedAt = 0; updateTransport(0); }
}

function currentTime() {
  if (!state.audioCtx) return 0;
  if (state.playing) return state.audioCtx.currentTime - state.startedAt;
  return state.pausedAt;
}

// ─── Haptics ─────────────────────────────────────────────────────────────────
// Fire haptics via the server (macOS Core Haptics) so they work on localhost.
// Also try navigator.vibrate as a fallback for mobile browsers.
function fireHaptic(midi, duration, legato) {
  // Server-side haptics (macOS)
  fetch("/api/haptic", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ midi, duration, legato }),
  }).catch(() => {});

  // Mobile fallback
  if (navigator.vibrate) {
    navigator.vibrate(Math.round(Math.min(duration * 900, 800)));
  }
}

function scheduleHaptics(fromSec) {
  clearHaptics();

  let prevNoteEnd = null;

  state.notes.forEach((note, i) => {
    if (note.is_rest || note.midi === null) return;
    const delay = (note.start_time - fromSec) * 1000;
    if (delay < -100) return; // already passed

    // Legato: if this note starts within 50 ms of the previous note ending,
    // skip the attack transient for a smoother haptic transition.
    const legato = prevNoteEnd !== null &&
                   (note.start_time - prevNoteEnd) < 0.05;
    prevNoteEnd = note.start_time + note.duration;

    const t = setTimeout(
      () => fireHaptic(note.midi, note.duration, legato),
      Math.max(0, delay)
    );
    state.hapticTimers.push(t);
  });
}

function clearHaptics() {
  state.hapticTimers.forEach(t => clearTimeout(t));
  state.hapticTimers = [];
  fetch("/api/haptic/stop", { method: "POST" }).catch(() => {});
  if (navigator.vibrate) navigator.vibrate(0);
}

// ─── Rendering ───────────────────────────────────────────────────────────────
const WAVEFORM_H = 0;     // no waveform strip
const SPECTRUM_H = 70;    // px reserved for spectrum at bottom
const LABEL_W    = 32;    // px for piano key labels on left

// ─── Abstract visual effects (ripples + ambient glow) ────────────────────────
let ripples        = [];
let lastRippleNote = null;

function emitRipple(x, y, hue, intensity = 1) {
  ripples.push({
    x, y, r: 0,
    maxR:  70 + intensity * 130,
    alpha: 0.85,
    hue,
    speed: 2.5 + intensity * 2.2,
  });
}

// Soft radial glow tinted to the current note's hue
function drawAmbientGlow(W, H, activeNote) {
  if (!activeNote) return;
  const hue = midiToHue(activeNote.midi);
  const cx  = W / 2, cy = H * 0.55;
  const g   = ctx2d.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.75);
  g.addColorStop(0, `hsla(${hue}, 90%, 45%, 0.14)`);
  g.addColorStop(1, `hsla(${hue}, 80%, 20%, 0)`);
  ctx2d.fillStyle = g;
  ctx2d.fillRect(0, 0, W, H);
}

// Concentric ring pulses that emanate from note onset positions
function drawRipples(W, H) {
  ripples = ripples.filter(r => r.alpha > 0.012);
  for (const r of ripples) {
    r.r    += r.speed;
    r.alpha *= 0.932;
    if (r.r > r.maxR) r.alpha = 0;

    ctx2d.beginPath();
    ctx2d.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx2d.strokeStyle = `hsla(${r.hue}, 95%, 68%, ${r.alpha})`;
    ctx2d.lineWidth   = 2.5;
    ctx2d.stroke();

    if (r.r > 22) {
      ctx2d.beginPath();
      ctx2d.arc(r.x, r.y, r.r * 0.55, 0, Math.PI * 2);
      ctx2d.strokeStyle = `hsla(${r.hue + 14}, 90%, 78%, ${r.alpha * 0.42})`;
      ctx2d.lineWidth   = 1;
      ctx2d.stroke();
    }
  }
}


function drawFrame() {
  if (!state.playing) return;
  requestAnimationFrame(drawFrame);

  const W = canvas.width  / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  const t = currentTime();

  ROLL.rollTop = WAVEFORM_H + 10;
  ROLL.rollBot = H - SPECTRUM_H - 10;
  ROLL.noteH   = Math.max(4, (ROLL.rollBot - ROLL.rollTop) / (ROLL.midiHi - ROLL.midiLo));

  // ── pull analysis data ──
  state.analyser.getByteTimeDomainData(waveData);
  state.analyser.getByteFrequencyData(freqData);

  // ── find active note ──
  const activeNote = state.notes.find(
    n => !n.is_rest && n.start_time <= t && t < n.start_time + n.duration
  ) || null;

  // ── emit effects on note onset ──
  if (activeNote) {
    const noteKey = activeNote.start_time + '-' + activeNote.midi;
    if (noteKey !== lastRippleNote) {
      lastRippleNote = noteKey;
      const hx = W * ROLL.headRatio;
      const ny = midiToY(activeNote.midi);
      emitRipple(hx, ny, midiToHue(activeNote.midi), activeNote.confidence);
    }
  }

  // ── background ──
  ctx2d.clearRect(0, 0, W, H);
  ctx2d.fillStyle = "#0c0806";
  ctx2d.fillRect(0, 0, W, H);

  drawAmbientGlow(W, H, activeNote);
  drawSpectrum(W, H);
  drawPianoRoll(W, H, t);
  drawRipples(W, H);
  drawPlayhead(W, H, t);
  updateNoteInfo(t);
  updateTransport(t);
}

function drawIdle() {
  const W = canvas.width  / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  ctx2d.fillStyle = "#0c0806";
  ctx2d.fillRect(0, 0, W, H);
  // Subtle warm vignette glow
  const g = ctx2d.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.55);
  g.addColorStop(0, "rgba(255,138,90,0.07)");
  g.addColorStop(1, "rgba(255,90,90,0)");
  ctx2d.fillStyle = g;
  ctx2d.fillRect(0, 0, W, H);
  ctx2d.fillStyle = "#4a2e1e";
  ctx2d.font = "14px system-ui";
  ctx2d.textAlign = "center";
  ctx2d.fillText("Drop an audio file here, or use the controls above.", W/2, H/2);
}

// ── Spectrum ──────────────────────────────────────────────────────────────────
function drawSpectrum(W, H) {
  const barCount = 80;
  const barW     = (W - LABEL_W) / barCount;
  const yBase    = H;

  for (let i = 0; i < barCount; i++) {
    const idx   = Math.floor(i / barCount * freqData.length * 0.5);
    const val   = freqData[idx] / 255;
    const barH  = val * SPECTRUM_H * 1.4;
    const hue   = (i / barCount) * 55;
    ctx2d.fillStyle = `hsla(${hue}, 95%, 62%, ${0.28 + val * 0.55})`;
    ctx2d.fillRect(LABEL_W + i * barW + 1, yBase - barH, barW - 2, barH);
  }
}


// ── Piano roll ────────────────────────────────────────────────────────────────
function drawPianoRoll(W, H, currentSec) {
  const rollH = ROLL.rollBot - ROLL.rollTop;

  // subtle grid lines per octave
  for (let midi = ROLL.midiLo; midi <= ROLL.midiHi; midi++) {
    if (midi % 12 === 0) {
      const y = midiToY(midi);
      ctx2d.strokeStyle = "rgba(255,255,255,0.05)";
      ctx2d.lineWidth = 1;
      ctx2d.beginPath();
      ctx2d.moveTo(LABEL_W, y); ctx2d.lineTo(W, y);
      ctx2d.stroke();
      ctx2d.fillStyle = "rgba(255,255,255,0.2)";
      ctx2d.font = "10px monospace";
      ctx2d.textAlign = "right";
      const name = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"][midi%12];
      const oct  = (midi >> 2) - 1; // rough octave
      ctx2d.fillText(`${name}${Math.floor(midi/12)-1}`, LABEL_W - 3, y + 4);
    }
  }

  const pixPerSec = W / ROLL.windowSec;
  const headX     = W * ROLL.headRatio;

  state.notes.forEach(note => {
    if (note.is_rest || note.midi === null) return;

    const x1 = timeToX(note.start_time, currentSec);
    const x2 = timeToX(note.start_time + note.duration, currentSec);
    if (x2 < LABEL_W || x1 > W) return; // offscreen

    const y    = midiToY(note.midi);
    const h    = Math.max(4, ROLL.noteH - 2);
    const w    = Math.max(4, x2 - x1 - 2);
    const hue  = midiToHue(note.midi);

    // is this note currently playing?
    const isActive = note.start_time <= currentSec &&
                     currentSec < note.start_time + note.duration;

    if (isActive) {
      // glow halo
      ctx2d.shadowColor = `hsl(${hue}, 90%, 65%)`;
      ctx2d.shadowBlur  = 20;
    }

    const alpha = isActive ? 1 : 0.55 + 0.3 * note.confidence;
    ctx2d.fillStyle = `hsla(${hue}, 80%, ${isActive ? 65 : 55}%, ${alpha})`;
    ctx2d.beginPath();
    ctx2d.roundRect(x1, y - h/2, w, h, 3);
    ctx2d.fill();

    ctx2d.shadowBlur = 0;
    ctx2d.shadowColor = "transparent";
  });
}

// ── Playhead ──────────────────────────────────────────────────────────────────
function drawPlayhead(W, H, currentSec) {
  const x = W * ROLL.headRatio;

  // gradient line
  const grad = ctx2d.createLinearGradient(x, ROLL.rollTop, x, ROLL.rollBot);
  grad.addColorStop(0,   "rgba(255,140,60,0)");
  grad.addColorStop(0.3, "rgba(255,150,70,0.9)");
  grad.addColorStop(0.7, "rgba(255,150,70,0.9)");
  grad.addColorStop(1,   "rgba(255,140,60,0)");

  ctx2d.strokeStyle = grad;
  ctx2d.lineWidth   = 2;
  ctx2d.shadowColor = "#FF8B5A";
  ctx2d.shadowBlur  = 12;
  ctx2d.beginPath();
  ctx2d.moveTo(x, ROLL.rollTop);
  ctx2d.lineTo(x, ROLL.rollBot);
  ctx2d.stroke();
  ctx2d.shadowBlur = 0;
}

// ── Note info overlay ─────────────────────────────────────────────────────────
function updateNoteInfo(t) {
  const active = state.notes.find(
    n => !n.is_rest && n.start_time <= t && t < n.start_time + n.duration
  );
  if (active) {
    const hue = midiToHue(active.midi);
    noteNameEl.textContent = active.note_name;
    noteNameEl.style.color = `hsl(${hue}, 85%, 72%)`;
    noteHzEl.textContent   = active.hz ? `${active.hz} Hz` : "";
  } else {
    noteNameEl.textContent = "—";
    noteNameEl.style.color = "#FF8B5A";
    noteHzEl.textContent   = "";
  }
}

// ── Transport ─────────────────────────────────────────────────────────────────
function updateTransport(t) {
  if (!state.audioBuffer) return;
  const dur = state.audioBuffer.duration;
  const pct = Math.min(100, (t / dur) * 100);
  progressFill.style.width = pct + "%";
  timeLabel.textContent = `${fmt(t)} / ${fmt(dur)}`;
}

// ─── Utils ───────────────────────────────────────────────────────────────────
function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, "0");
  return `${m}:${s}`;
}
function setStatus(msg, active = false) {
  statusBar.textContent = msg;
  statusBar.className   = active ? "active" : "";
}
function showOverlay(msg) {
  procLabel.textContent = msg;
  overlay.classList.add("visible");
}
function hideOverlay() {
  overlay.classList.remove("visible");
}

// ─── Init ─────────────────────────────────────────────────────────────────────
drawIdle();
</script>

<script>
// ─── Violin Animation ─────────────────────────────────────────────────────────
(function () {
  const VW = 600, VH = 430;

  // ── Layout ──────────────────────────────────────────────────────────────────
  // Player (3/4 view, face turned slightly left toward violin)
  const HEAD     = { x: 372, y: 70,  rx: 26, ry: 31 };
  const L_SHOUL  = { x: 304, y: 134 };   // violin-arm shoulder
  const R_SHOUL  = { x: 436, y: 138 };   // bow-arm shoulder
  const BODY_TOP = { x: 370, y: 112 };
  const BODY_BOT = { x: 366, y: 372 };

  // Violin — chin-rest end near player's chin, scroll points upper-left
  const CHIN_REST = { x: 308, y: 126 };  // ebony chin rest (under player's jaw)
  const VIOL_UC   = { x: 258, y: 158 };  // upper bout centre
  const BRIDGE    = { x: 234, y: 184 };  // bridge — bow contact point
  const VIOL_LC   = { x: 218, y: 213 };  // lower bout centre
  const NECK_ROOT = { x: 268, y: 142 };  // where neck meets body
  const NUT       = { x: 160, y: 106 };  // top of fingerboard / nut
  const SCROLL    = { x: 140, y:  93 };  // scroll tip
  const TAIL      = { x: 316, y: 133 };  // tailpiece

  // Bow — contact at bridge, stick runs roughly horizontal with slight tilt
  const BOW_CX  = BRIDGE.x;             // fixed string-contact x
  const BOW_CY  = BRIDGE.y + 1;         // fixed string-contact y
  const BOW_LEN = 192;                   // full bow length (px)
  // frogX = BOW_CX + bowPos * BOW_LEN  →  at bowPos=0 frog is near strings
  const BOW_MIN = 0.30;
  const BOW_MAX = 0.92;

  // Two-bone arm lengths (px)
  const LU = 80, LF = 76;   // left  (violin arm): upper, forearm
  const RU = 84, RF = 78;   // right (bow arm):    upper, forearm

  // ── State ────────────────────────────────────────────────────────────────────
  let vCanvas, vCtx, rc;
  let staticImg   = null;
  let bowPos      = 0.55;
  let bowSmooth   = 0.55;
  let bowDir      = 1;
  let lastNoteIdx = -1;
  let animId      = null;
  let isOpen      = false;

  // ── 2-bone IK: returns elbow position ────────────────────────────────────────
  // flipDown=false → elbow bends in the "negative-perp" direction (hangs downward)
  function ik(sx, sy, hx, hy, L1, L2, flipDown) {
    const dx = hx - sx, dy = hy - sy;
    let   d  = Math.sqrt(dx * dx + dy * dy);
    d = Math.min(d, L1 + L2 - 0.5);
    const cosA = (d * d + L1 * L1 - L2 * L2) / (2 * d * L1);
    const a    = Math.acos(Math.max(-1, Math.min(1, cosA)));
    const base = Math.atan2(dy, dx);
    const ang  = flipDown ? base + a : base - a;
    return { x: sx + L1 * Math.cos(ang), y: sy + L1 * Math.sin(ang) };
  }

  // ── Finger position along fingerboard (open string → 4th pos) ────────────────
  function fingerPos(midi) {
    if (!midi) return { x: NUT.x, y: NUT.y };
    const t = Math.max(0, Math.min(1, (midi - 55) / (84 - 55)));
    return { x: NUT.x + t * (NECK_ROOT.x - NUT.x),
             y: NUT.y + t * (NECK_ROOT.y - NUT.y) };
  }

  // ── Static render (violin + figure body — cached to offscreen canvas) ─────────
  function renderStatic() {
    const oc = document.createElement('canvas');
    oc.width = VW; oc.height = VH;
    const ox  = oc.getContext('2d');
    const orc = rough.canvas(oc);

    // Warm parchment
    ox.fillStyle = '#f3ecdf';
    ox.fillRect(0, 0, VW, VH);
    for (let i = 0; i < 2200; i++) {
      ox.fillStyle = `rgba(138,112,76,${Math.random() * 0.016})`;
      ox.fillRect(Math.random() * VW, Math.random() * VH, 2, 2);

    // ── Violin body ───────────────────────────────────────────────────────────

    // Lower bout
    orc.ellipse(VIOL_LC.x, VIOL_LC.y, 90, 68, wood);
    // Upper bout
    orc.ellipse(VIOL_UC.x, VIOL_UC.y, 70, 54, wood);
    // Waist fill (solid wood between bouts)
    ox.fillStyle = '#c87c2c';
    ox.beginPath();
    ox.ellipse(VIOL_UC.x - 10, VIOL_UC.y + 37, 28, 18, -0.22, 0, Math.PI * 2);
    ox.fill();
    // Varnish sheen highlight
    ox.fillStyle = 'rgba(255,210,140,0.20)';
    ox.beginPath();
    ox.ellipse(VIOL_LC.x - 12, VIOL_LC.y - 8, 22, 14, -0.4, 0, Math.PI * 2);
    ox.fill();
    // Outline re-pass
    orc.ellipse(VIOL_LC.x, VIOL_LC.y, 90, 68, { roughness: 1.0, stroke: '#52300e', strokeWidth: 1.8, fill: 'transparent' });
    orc.ellipse(VIOL_UC.x, VIOL_UC.y, 70, 54, { roughness: 1.0, stroke: '#52300e', strokeWidth: 1.8, fill: 'transparent' });
    // Purfling (inlay border)
    orc.ellipse(VIOL_LC.x, VIOL_LC.y, 76, 55, { roughness: 0.9, stroke: '#2a1408', strokeWidth: 1.1, fill: 'transparent' });

    // F-holes
    orc.line(BRIDGE.x - 13, BRIDGE.y - 20, BRIDGE.x - 17, BRIDGE.y + 13, { roughness: 2.1, stroke: '#2a1408', strokeWidth: 2.3 });
    orc.line(BRIDGE.x +  7, BRIDGE.y - 18, BRIDGE.x +  5, BRIDGE.y + 14, { roughness: 2.1, stroke: '#2a1408', strokeWidth: 2.3 });
    // F-hole notch dots
    orc.ellipse(BRIDGE.x - 13, BRIDGE.y - 16, 5, 4, { roughness: 1, stroke: '#180c04', fill: '#180c04', fillStyle: 'solid', strokeWidth: 1 });
    orc.ellipse(BRIDGE.x +  7, BRIDGE.y - 14, 5, 4, { roughness: 1, stroke: '#180c04', fill: '#180c04', fillStyle: 'solid', strokeWidth: 1 });

    // Neck (maple — wide)
    orc.line(NUT.x, NUT.y, NECK_ROOT.x, NECK_ROOT.y, { roughness: 0.8, stroke: '#6a3c18', strokeWidth: 15 });
    // Fingerboard (ebony — narrower, darker)
    orc.line(NUT.x - 1, NUT.y + 3, NECK_ROOT.x - 1, NECK_ROOT.y + 2, { roughness: 0.5, stroke: '#120802', strokeWidth: 9 });
    // Wood grain on neck
    orc.line(NUT.x + 4, NUT.y - 2, NECK_ROOT.x + 3, NECK_ROOT.y - 1, { roughness: 2.2, stroke: '#8a5228', strokeWidth: 1.1 });

    // 4 strings (E/A silver, D/G golden-wound)
    for (let i = 0; i < 4; i++) {
      const nx = NUT.x + (i - 1.5) * 3.2;
      const tx = TAIL.x + (i - 1.5) * 2.0;
      orc.line(nx, NUT.y, tx, TAIL.y, {
        roughness: 0.2,
        stroke: i < 2 ? '#c0c0c0' : '#d0b870',
        strokeWidth: [0.7, 0.9, 1.1, 1.4][i]
      });
    }

    // Bridge (maple arch + feet)
    orc.arc(BRIDGE.x, BRIDGE.y - 4, 22, 11, Math.PI, 0, false, { roughness: 2, stroke: '#7a5022', strokeWidth: 2.5 });
    orc.line(BRIDGE.x - 8, BRIDGE.y + 3, BRIDGE.x + 8, BRIDGE.y + 3, { roughness: 1, stroke: '#7a5022', strokeWidth: 1.5 });
    orc.line(BRIDGE.x - 7, BRIDGE.y + 3, BRIDGE.x - 6, BRIDGE.y + 8, { roughness: 1.5, stroke: '#7a5022', strokeWidth: 1.8 });
    orc.line(BRIDGE.x + 6, BRIDGE.y + 3, BRIDGE.x + 7, BRIDGE.y + 8, { roughness: 1.5, stroke: '#7a5022', strokeWidth: 1.8 });

    // Scroll (double spiral)
    orc.arc(SCROLL.x + 9, SCROLL.y + 9, 23, 21, Math.PI * 0.5, Math.PI * 2.7, false, { roughness: 2.5, stroke: '#3a1a08', strokeWidth: 2.8 });
    orc.arc(SCROLL.x + 7, SCROLL.y + 7, 11, 10, Math.PI * 0.5, Math.PI * 2.7, false, { roughness: 2.0, stroke: '#3a1a08', strokeWidth: 1.5 });
    // Peg box
    orc.line(NUT.x - 2, NUT.y - 2, SCROLL.x + 14, SCROLL.y + 7, { roughness: 1, stroke: '#5a3010', strokeWidth: 4 });
    // Tuning pegs (4)
    for (let p = 0; p < 4; p++) {
      orc.ellipse(NUT.x - 6 + p * 3.2, NUT.y - 5 - p * 2.8, 5, 3,
        { roughness: 1.5, stroke: '#3a1808', fill: '#2a1008', fillStyle: 'solid', strokeWidth: 1 });
    }

    // Tailpiece (ebony)
    orc.polygon(
      [[TAIL.x - 11, TAIL.y - 4], [TAIL.x + 11, TAIL.y - 4],
       [TAIL.x +  8, TAIL.y + 14], [TAIL.x -  8, TAIL.y + 14]],
      { roughness: 1.4, stroke: '#2a1408', fill: '#180c04', fillStyle: 'solid', strokeWidth: 1.8 }
    );

    // Chin rest (ebony, near player)
    orc.ellipse(CHIN_REST.x, CHIN_REST.y, 30, 13,
      { roughness: 1.5, stroke: '#2a1408', fill: '#180c04', fillStyle: 'solid', strokeWidth: 1.5 });
    orc.line(CHIN_REST.x - 8, CHIN_REST.y + 6, CHIN_REST.x - 8, CHIN_REST.y + 11, { roughness: 1, stroke: '#2a1408', strokeWidth: 1.5 });
    orc.line(CHIN_REST.x + 8, CHIN_REST.y + 6, CHIN_REST.x + 8, CHIN_REST.y + 11, { roughness: 1, stroke: '#2a1408', strokeWidth: 1.5 });

    // ── Figure ────────────────────────────────────────────────────────────────
    // Concert jacket (hachure fill)
    orc.ellipse(BODY_TOP.x + 8, BODY_TOP.y + 120, 106, 198,
      { roughness: 1.9, stroke: '#0e0d14', fill: '#0e0d14',
        fillStyle: 'hachure', fillWeight: 2.8, hachureGap: 11, hachureAngle: 48 });
    // Lapels
    orc.line(BODY_TOP.x + 5, BODY_TOP.y + 5, BODY_TOP.x - 6, BODY_TOP.y + 44,
      { roughness: 1.5, stroke: '#22202e', strokeWidth: 2.8 });
    orc.line(BODY_TOP.x + 5, BODY_TOP.y + 5, BODY_TOP.x + 17, BODY_TOP.y + 44,
      { roughness: 1.5, stroke: '#22202e', strokeWidth: 2.8 });
    // Shirt + bow tie
    orc.line(BODY_TOP.x + 5, BODY_TOP.y + 7, BODY_TOP.x + 5, BODY_TOP.y + 52,
      { roughness: 1.4, stroke: '#ede6d8', strokeWidth: 2.2 });
    orc.ellipse(BODY_TOP.x + 5, BODY_TOP.y + 7, 14, 7,
      { roughness: 1.8, stroke: '#1a1828', fill: '#1a1828', fillStyle: 'solid', strokeWidth: 1 });
    // Shoulder seams
    orc.line(BODY_TOP.x, BODY_TOP.y, L_SHOUL.x, L_SHOUL.y, { roughness: 1.4, stroke: '#0e0d14', strokeWidth: 5 });
    orc.line(BODY_TOP.x, BODY_TOP.y, R_SHOUL.x, R_SHOUL.y, { roughness: 1.4, stroke: '#0e0d14', strokeWidth: 5 });
    // Legs
    orc.line(BODY_BOT.x - 14, BODY_BOT.y, BODY_BOT.x - 18, BODY_BOT.y + 58, { roughness: 2, stroke: '#0e0d14', strokeWidth: 5 });
    orc.line(BODY_BOT.x +  6, BODY_BOT.y, BODY_BOT.x + 10, BODY_BOT.y + 58, { roughness: 2, stroke: '#0e0d14', strokeWidth: 5 });

    // Neck
    orc.line(HEAD.x - 3, HEAD.y + HEAD.ry - 2, BODY_TOP.x + 2, BODY_TOP.y + 5,
      { roughness: 0.8, stroke: '#d4a868', strokeWidth: 10 });
    // Head (face slightly angled toward violin — chin dips left)
    orc.ellipse(HEAD.x, HEAD.y, HEAD.rx * 2, HEAD.ry * 2,
      { roughness: 1.1, stroke: '#3a2008', strokeWidth: 1.8, fill: '#f2c87a', fillStyle: 'solid' });
    // Hair (swept back)
    orc.arc(HEAD.x - 4, HEAD.y - 8, HEAD.rx * 2 - 2, HEAD.ry * 1.5, Math.PI, 0, false,
      { roughness: 3.5, stroke: '#1c0e00', strokeWidth: 7 });
    orc.arc(HEAD.x - HEAD.rx, HEAD.y - 3, 14, 18, Math.PI * 0.3, Math.PI * 1.1, false,
      { roughness: 2.5, stroke: '#1c0e00', strokeWidth: 5 });
    // Ear
    orc.arc(HEAD.x - HEAD.rx + 3, HEAD.y + 6, 10, 14, Math.PI * 0.5, Math.PI * 1.5, false,
      { roughness: 1.8, stroke: '#b08048', strokeWidth: 1.5 });
    // Earring
    orc.ellipse(HEAD.x - HEAD.rx + 2, HEAD.y + 13, 4, 4,
      { roughness: 1, stroke: '#a07830', fill: '#c8a040', fillStyle: 'solid', strokeWidth: 1 });
    // Jawline (chin dipping toward chin rest)
    orc.line(HEAD.x - 18, HEAD.y + 22, HEAD.x - 8, HEAD.y + HEAD.ry - 1,
      { roughness: 1.5, stroke: '#c09458', strokeWidth: 1.5 });

    staticImg = oc;
  }

  // ── Per-frame draw ───────────────────────────────────────────────────────────
  function drawFrame() {
    if (!isOpen) return;
    animId = requestAnimationFrame(drawFrame);

    const t     = currentTime();
    const notes = state.notes;

    // Active note
    let activeNote = null, noteIdx = -1;
    for (let i = 0; i < notes.length; i++) {
      const n = notes[i];
      if (!n.is_rest && n.start_time <= t && t < n.start_time + n.duration) {
        activeNote = n; noteIdx = i; break;
      }
    }

    // Note change → reverse bow
    if (noteIdx !== -1 && noteIdx !== lastNoteIdx) {
      bowDir      = -bowDir;
      lastNoteIdx = noteIdx;
    }

    if (activeNote) {
      const speed = Math.min(0.018, 0.38 / (activeNote.duration * 60));
      bowPos += bowDir * speed;
      if (bowPos >= BOW_MAX) { bowPos = BOW_MAX; bowDir = -1; }
      if (bowPos <= BOW_MIN) { bowPos = BOW_MIN; bowDir =  1; }
    }
    bowSmooth += (bowPos - bowSmooth) * 0.12;

    const fp    = activeNote ? fingerPos(activeNote.midi) : { x: NUT.x, y: NUT.y };
    const frogX = BOW_CX + bowSmooth * BOW_LEN;
    const tipX  = frogX - BOW_LEN;
    // Bow tilt: stick rises slightly toward the tip (bow is cambered away from hair)
    const bowStickY = (x) => BOW_CY + (frogX - x) * 0.045 - 8;
    const bowHairY  = (x) => BOW_CY + (frogX - x) * 0.018;

    vCtx.clearRect(0, 0, VW, VH);
    vCtx.drawImage(staticImg, 0, 0);

    // ── Left arm (violin arm) — elbow hangs naturally DOWN ───────────────────
    const lhx = fp.x + 1, lhy = fp.y + 9;
    const elbL = ik(L_SHOUL.x, L_SHOUL.y, lhx, lhy, LU, LF, false);
    rc.line(L_SHOUL.x, L_SHOUL.y, elbL.x, elbL.y, { roughness: 1.4, stroke: '#0e0d14', strokeWidth: 8 });
    rc.line(elbL.x, elbL.y, lhx, lhy,             { roughness: 1.2, stroke: '#0e0d14', strokeWidth: 7 });
    // Left hand wrapping neck from below
    rc.ellipse(fp.x - 3, fp.y + 6, 18, 12,
      { roughness: 1.7, stroke: '#3a2008', fill: '#f2c87a', fillStyle: 'solid', strokeWidth: 1.5 });
    // Thumb (visible on underside of neck)
    rc.ellipse(fp.x + 5, fp.y + 1, 9, 6,
      { roughness: 1.5, stroke: '#3a2008', fill: '#d4a860', fillStyle: 'solid', strokeWidth: 1 });
    // Fingers pressing strings
    if (activeNote && !activeNote.is_rest) {
      for (let f = 0; f < 3; f++) {
        rc.ellipse(fp.x - 6 + f * 4, fp.y - 1, 7, 5,
          { roughness: 1.5, stroke: '#3a2008', fill: '#d4a860', fillStyle: 'solid', strokeWidth: 1 });
      }
    }

    // ── Right arm (bow arm) — elbow drops, forearm swings with bow ───────────
    const rhx = frogX, rhy = bowHairY(frogX) + 5;
    const elbR = ik(R_SHOUL.x, R_SHOUL.y, rhx, rhy, RU, RF, false);
    rc.line(R_SHOUL.x, R_SHOUL.y, elbR.x, elbR.y, { roughness: 1.4, stroke: '#0e0d14', strokeWidth: 8 });
    rc.line(elbR.x, elbR.y, rhx, rhy,             { roughness: 1.2, stroke: '#0e0d14', strokeWidth: 7 });
    // Bow grip (hand)
    rc.ellipse(frogX + 3, rhy + 5, 22, 13,
      { roughness: 1.7, stroke: '#3a2008', fill: '#f2c87a', fillStyle: 'solid', strokeWidth: 1.5 });
    // Thumb on stick
    rc.ellipse(frogX - 5, rhy - 2, 10, 7,
      { roughness: 1.5, stroke: '#3a2008', fill: '#d4a860', fillStyle: 'solid', strokeWidth: 1 });
    // Fingers curled over stick
    for (let f = 0; f < 4; f++) {
      rc.ellipse(frogX - 12 + f * 6, rhy + 8, 7, 5,
        { roughness: 1.4, stroke: '#3a2008', fill: '#d4a860', fillStyle: 'solid', strokeWidth: 1 });
    }

    // ── Bow ──────────────────────────────────────────────────────────────────
    // Pernambuco stick (warm red-brown, slight upward camber)
    rc.line(tipX, bowStickY(tipX), frogX, bowStickY(frogX),
      { roughness: 0.6, stroke: '#7a3e14', strokeWidth: 3.8 });
    // Bow hair (cream-white)
    rc.line(tipX + 6, bowHairY(tipX), frogX - 14, bowHairY(frogX),
      { roughness: 0.3, stroke: '#ddd5c0', strokeWidth: 2.2 });
    // Frog (ebony block)
    rc.rectangle(frogX - 15, bowHairY(frogX) - 3, 15, 12,
      { roughness: 1.5, stroke: '#2a1408', fill: '#180c04', fillStyle: 'solid', strokeWidth: 1.5 });
    // Frog eye (mother-of-pearl inlay)
    rc.ellipse(frogX - 9, bowHairY(frogX) + 3, 5, 4,
      { roughness: 0.9, stroke: '#9088a8', fill: '#ccc0d8', fillStyle: 'solid', strokeWidth: 0.8 });
    // Winding / grip wrapping near frog
    for (let w = 0; w < 4; w++) {
      const wx = frogX - 20 - w * 4, wy = bowStickY(frogX - 20 - w * 4);
      rc.line(wx, wy - 1, wx, wy + 5, { roughness: 0.5, stroke: '#a07040', strokeWidth: 1.6 });
    }
    // Tip plate (ivory)
    rc.rectangle(tipX - 3, bowStickY(tipX) - 2, 7, 8,
      { roughness: 1.5, stroke: '#4a3018', fill: '#f0ece0', fillStyle: 'solid', strokeWidth: 1 });

    // ── String vibration glow when playing ───────────────────────────────────
    if (activeNote && !activeNote.is_rest) {
      const amp   = 1.4 + 0.5 * Math.sin(Date.now() * 0.013);
      const strDX = TAIL.x - NUT.x, strDY = TAIL.y - NUT.y;
      const strL  = Math.sqrt(strDX * strDX + strDY * strDY);
      const nx    = -strDY / strL, ny = strDX / strL;   // perpendicular unit

      vCtx.save();
      vCtx.strokeStyle = 'rgba(255,215,80,0.28)';
      vCtx.lineWidth   = 2.8;
      vCtx.shadowColor = 'rgba(255,190,50,0.55)';
      vCtx.shadowBlur  = 7;
      vCtx.beginPath();
      const STEPS = 22;
      for (let s = 0; s <= STEPS; s++) {
        const frac  = s / STEPS;
        const bx    = NUT.x + frac * strDX;
        const by    = NUT.y + frac * strDY;
        const wave  = Math.sin(frac * Math.PI * 5 + Date.now() * 0.022) * amp;
        s === 0 ? vCtx.moveTo(bx + nx * wave, by + ny * wave)
                : vCtx.lineTo(bx + nx * wave, by + ny * wave);
      }
      vCtx.stroke();
      vCtx.restore();

      // Rosin dust at contact
      vCtx.save();
      for (let i = 0; i < 9; i++) {
        vCtx.globalAlpha = 0.06 + Math.random() * 0.10;
        vCtx.fillStyle   = '#d0a038';
        vCtx.beginPath();
        vCtx.arc(BOW_CX + (Math.random() - 0.5) * 16,
                 BOW_CY + (Math.random() - 0.5) * 10,
                 Math.random() * 2.5 + 0.4, 0, Math.PI * 2);
        vCtx.fill();
      }
      vCtx.restore();
    }

    // ── Status labels ─────────────────────────────────────────────────────────
    const hue = activeNote ? (25 + ((activeNote.midi - 48) / 36) * 200) % 360 : null;
    document.getElementById('viol-note').textContent = activeNote ? activeNote.note_name : '—';
    document.getElementById('viol-note').style.color = hue ? `hsl(${hue},70%,36%)` : '#7a5030';
    document.getElementById('viol-bow').textContent  = bowDir > 0 ? '↓ down-bow' : '↑ up-bow';
    document.getElementById('viol-pos').textContent  =
      !activeNote          ? 'open string'  :
      activeNote.midi < 58 ? '1st position' :
      activeNote.midi < 64 ? '2nd position' :
      activeNote.midi < 70 ? '3rd position' : '4th position';
  }

  // ── Modal open / close ────────────────────────────────────────────────────────
  function openModal() {
    if (!staticImg) renderStatic();
    isOpen = true; bowPos = 0.55; bowSmooth = 0.55; bowDir = 1; lastNoteIdx = -1;
    document.getElementById('violin-modal').classList.add('visible');
    drawFrame();
  }
  function closeModal() {
    isOpen = false;
    document.getElementById('violin-modal').classList.remove('visible');
    if (animId) { cancelAnimationFrame(animId); animId = null; }
  }

  window.addEventListener('DOMContentLoaded', () => {
    vCanvas = document.getElementById('violin-canvas');
    vCtx    = vCanvas.getContext('2d');
    rc      = rough.canvas(vCanvas);
    document.getElementById('btn-animate').addEventListener('click', openModal);
    document.getElementById('btn-violin-close').addEventListener('click', closeModal);
    document.getElementById('violin-modal').addEventListener('click', e => {
      if (e.target.id === 'violin-modal') closeModal();
    });
  });
})();
</script>
</body>
</html>
